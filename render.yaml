services:
  # Backend API Service
  - type: web
    name: retake-roulette-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: retake-roulette-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health

  # Frontend Service (Next.js)
  - type: web
    name: retake-roulette-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: retake-roulette-db
    databaseName: retake_roulette
    plan: free
