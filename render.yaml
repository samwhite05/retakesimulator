services:
  # Backend API Service
  - type: web
    name: spikedle-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: spikedle-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health

  # Frontend Service (Next.js)
  - type: web
    name: spikedle
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

databases:
  - name: spikedle-db
    databaseName: retake_roulette
    plan: free
